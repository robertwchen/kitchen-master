run_name: court_reg_v2

video:
  path: data/real/videos/pickle_vid_1.MOV

annotations:
  path: data/real/annotations/annotations_v2.json

stabilizer:
  n_features: 3000
  ratio_test: 0.75
  min_matches: 15
  ransac_threshold_px: 4.0
  transform_type: homography   # "homography" or "affine"
  top_mask_frac: 0.25          # mask top 25% (sky/scoreboard background)

refinement:
  enabled: true
  search_px: 20
  n_sample_points: 30

comparison:
  enabled: true
  v1_summary: results/real_baseline/court_reg_v1/summary_report.json
  n_sample_frames: 50          # frames for edge-strength comparison

output:
  results_dir: results/real_baseline/
  save_overlay_video: true
  overlay_video_fps: 10.0
  overlay_video_scale: 0.5
  overlay_frame_step: 6
  debug_frame_indices: [0, 60, 300, 600, 1200, 2400]
